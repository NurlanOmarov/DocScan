# === DocScan (docscan.labhelp.me) ===
# Этот блок добавить в /home/administrator/labai/nginx/nginx.prod.conf

server {
    listen 80;
    server_name docscan.labhelp.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name docscan.labhelp.me;

    ssl_certificate /home/administrator/labai/certbot/conf/live/labhelp.me/fullchain.pem;
    ssl_certificate_key /home/administrator/labai/certbot/conf/live/labhelp.me/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
