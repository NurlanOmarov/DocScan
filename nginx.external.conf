# === DocScan (iproject.sbs) ===
# Этот блок добавить в /home/administrator/labai/nginx/nginx.prod.conf

server {
    listen 80;
    server_name iproject.sbs www.iproject.sbs;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://iproject.sbs$request_uri; }
}

server {
    listen 443 ssl;
    server_name www.iproject.sbs;
    ssl_certificate /etc/letsencrypt/live/iproject.sbs-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iproject.sbs-0001/privkey.pem;
    return 301 https://iproject.sbs$request_uri;
}

server {
    listen 443 ssl;
    server_name iproject.sbs;
    ssl_certificate /etc/letsencrypt/live/iproject.sbs-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iproject.sbs-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 50M;

    location / {
        proxy_pass http://docscan:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
