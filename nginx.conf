# === DocScan (docscan.labhelp.me) ===
# Этот блок добавить в /home/administrator/labai/nginx/nginx.prod.conf

server {
    listen 80;
    server_name docscan.labhelp.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name docscan.labhelp.me;

    ssl_certificate /home/administrator/labai/certbot/conf/live/labhelp.me/fullchain.pem;
    ssl_certificate_key /home/administrator/labai/certbot/conf/live/labhelp.me/privkey.pem;

    root /home/administrator/docscan/dist;
    index index.html;

    # Для React SPA — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Не кэшировать index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
